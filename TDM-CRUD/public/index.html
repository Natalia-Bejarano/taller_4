<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión</title>
    <link rel="stylesheet" href="./css/styles.css">
</head>
<body>
    <nav class="navbar">
        <ul>
            <li><a href="index.html">Gestión</a></li>
            <li><a href="catalog.html">Catálogo</a></li>
        </ul>
    </nav>

    <h1>Venta de productos Japoneses</h1>

    <form id="itemForm">
        <input type="text" id="name" placeholder="Nombre del item" required>
        <input type="text" id="description" placeholder="Descripción">
         <!--validacion de precio-->
        <input type="number" id="price" placeholder="Precio" min="0.01" step="0.01">
        <input type="text" id="seller" placeholder="Vendedor">
        <input type="text" id="category" placeholder="Categoría">
        <!--se coloca selector para las imagenes que vamos a meter en el proyecto-->
        <!--imagenes chiquitas-->
        <div class="img-select-wrap">
            <select id="img">
                <option value="">Seleccionar imagen</option>
            </select>

            <img id="imgPreview" src="" alt="Vista previa" class="img-preview-mini">
        </div>
        
        
        <input type="date" id="date" placeholder="Fecha">
        <!--validacion de stock-->
        <input type="number" id="stock" placeholder="Disponibilidad" min="0" step="1">
        <button type="submit" id="submitBtn">Agregar</button>
    </form>

    <table>
        <thead>
            <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Descripción</th>
            <th>Precio</th>   
            <th>Vendedor</th>
            <th>Categoría</th>
            <th>Imagen</th>
            <th>Fecha</th>
            <th>Disponibilidad</th>
            <th>Acciones</th>
            </tr>
        </thead>
        <tbody id="itemsTable"></tbody>
    </table>


    <script type="module" src="./js/main.js"></script>
</body>
</html>
